<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Events – Campus Event Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/events}">Campus Event Tracker</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/events}">Events</a></li>
                <li class="nav-item"><a class="nav-link active" th:href="@{/my-events}">My Events</a></li>
                <li class="nav-item" sec:authorize="hasRole('ORGANIZER')">
                    <a class="nav-link" th:href="@{/events/new}">Create Event</a>
                </li>
            </ul>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h2>My RSVPed Events</h2>
    <hr>

    <div th:if="${#lists.isEmpty(events)}" class="empty-state">
        <h4>You haven't RSVPed to any events yet.</h4>
        <p>Browse the <a th:href="@{/events}">event feed</a> to find events!</p>
    </div>

    <div class="row" th:unless="${#lists.isEmpty(events)}">
        <div class="col-md-4 mb-4" th:each="event : ${events}">
            <div class="card event-card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title" th:text="${event.title}">Event Title</h5>
                    <p class="card-text text-muted">
                        <small>
                            <span th:text="${#temporals.format(event.date, 'MMM dd, yyyy h:mm a')}"></span><br>
                            <span th:text="${event.location}"></span>
                        </small>
                    </p>
                </div>
                <div class="card-footer bg-white">
                    <a th:href="@{/events/{id}(id=${event.id})}" class="btn btn-rsvp btn-sm">View Details</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
