# .github/workflows/deploy.yml
name: Deploy — Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build production JAR
        run: mvn -B package -DskipTests

      - name: Build Docker image
        run: |
          docker build -t campus-event-tracker:${{ github.sha }} .
          docker tag campus-event-tracker:${{ github.sha }} \
            ${{ secrets.DOCKER_REGISTRY }}/campus-event-tracker:latest

      - name: Push image to registry
        env:
          DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
        run: |
          echo $DOCKER_TOKEN | docker login ${{ secrets.DOCKER_REGISTRY }} -u ci --password-stdin
          docker push ${{ secrets.DOCKER_REGISTRY }}/campus-event-tracker:latest

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_REGISTRY }}/campus-event-tracker:latest
            docker stop campus-event-tracker || true
            docker rm   campus-event-tracker || true
            docker run -d --name campus-event-tracker \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e DATABASE_URL=${{ secrets.DATABASE_URL }} \
              -e DATABASE_USER=${{ secrets.DATABASE_USER }} \
              -e DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }} \
              ${{ secrets.DOCKER_REGISTRY }}/campus-event-tracker:latest
