# .github/workflows/deploy.yml
name: Deploy — Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build production JAR
        run: mvn -B package -DskipTests

      - name: Build Docker image
        run: docker build -t campus-event-tracker:${{ github.sha }} .

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag Docker image for registry
        run: |
          docker tag campus-event-tracker:${{ github.sha }} \
            ${{ secrets.DOCKER_REGISTRY }}/${{ github.repository_owner }}/campus-event-tracker:latest

      - name: Push image to registry
        run: |
          docker push ${{ secrets.DOCKER_REGISTRY }}/${{ github.repository_owner }}/campus-event-tracker:latest
