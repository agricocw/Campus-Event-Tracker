<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Created Events — Campus Event Tracker</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a th:href="@{/events}" class="nav-brand">🎓 Campus Event Tracker</a>
            <div class="nav-links">
                <a th:href="@{/events}" class="nav-link">Events</a>
                <span sec:authorize="hasRole('ORGANIZER')">
                    <a th:href="@{/events/create}" class="nav-link btn-create">+ Create Event</a>
                </span>
                <span sec:authorize="isAuthenticated()" class="nav-user">
                    <a th:href="@{/user/my-events}" class="nav-link">My Events</a>
                    <span class="nav-username" sec:authentication="name"></span>
                    <form th:action="@{/auth/logout}" method="post" class="inline-form">
                        <button type="submit" class="btn-logout">Logout</button>
                    </form>
                </span>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="page-title">🎯 My Created Events</h1>

        <div class="event-grid" th:if="${!events.isEmpty()}">
            <div th:each="event : ${events}" class="event-card">
                <div class="event-card-header">
                    <span class="event-category" th:text="${event.category}">Category</span>
                    <span class="event-status" th:text="${event.status}"
                        th:classappend="${event.status.name() == 'PUBLISHED'} ? 'status-published' : (${event.status.name() == 'DRAFT'} ? 'status-draft' : 'status-cancelled')">
                    </span>
                </div>
                <h3 class="event-title" th:text="${event.title}">Event Title</h3>
                <div class="event-meta">
                    <p class="event-date">
                        📅 <span th:text="${#temporals.format(event.startTime, 'MMM dd, yyyy h:mm a')}">Date</span>
                    </p>
                    <p class="event-location">
                        📍 <span th:text="${event.location}">Location</span>
                    </p>
                    <p class="event-attendees">
                        👥 <span th:text="${event.attendeeCount}">0</span> attending
                        <span th:if="${event.capacity != null}">
                            / <span th:text="${event.capacity}">∞</span>
                        </span>
                    </p>
                </div>
                <div class="event-card-actions">
                    <a th:href="@{/events/{id}(id=${event.id})}" class="btn btn-outline btn-sm">View</a>
                    <a th:href="@{/events/{id}/edit(id=${event.id})}" class="btn btn-outline btn-sm">✏️ Edit</a>
                </div>
            </div>
        </div>

        <div class="empty-state" th:if="${events.isEmpty()}">
            <h3>You haven't created any events yet</h3>
            <p><a th:href="@{/events/create}" class="btn btn-primary">Create Your First Event</a></p>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Campus Event Tracker — University of Cincinnati</p>
    </footer>
</body>

</html>
