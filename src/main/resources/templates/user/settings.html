<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Settings — Campus Event Tracker</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a th:href="@{/events}" class="nav-brand">🎓 Campus Event Tracker</a>
            <div class="nav-links">
                <a th:href="@{/events}" class="nav-link">Events</a>
                <span sec:authorize="isAuthenticated()" class="nav-user">
                    <a th:href="@{/user/my-events}" class="nav-link">My Events</a>
                    <span class="nav-username" sec:authentication="name"></span>
                    <form th:action="@{/auth/logout}" method="post" class="inline-form">
                        <button type="submit" class="btn-logout">Logout</button>
                    </form>
                </span>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="page-title">Account Settings</h1>

        <div class="settings-card">
            <div class="settings-group">
                <h3>Profile Information</h3>
                <p><strong>Name:</strong> <span th:text="${user.firstName + ' ' + user.lastName}">Name</span></p>
                <p><strong>Email:</strong> <span th:text="${user.email}">email@example.com</span></p>
                <p><strong>Role:</strong> <span th:text="${user.role}">STUDENT</span></p>
                <p><strong>Member since:</strong>
                    <span th:text="${#temporals.format(user.createdAt, 'MMMM dd, yyyy')}">Date</span>
                </p>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Campus Event Tracker — University of Cincinnati</p>
    </footer>

    <script th:src="@{/js/app.js}"></script>
</body>

</html>
