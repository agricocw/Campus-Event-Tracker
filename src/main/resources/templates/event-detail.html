<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${event.title} + ' – Campus Event Tracker'">Event Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link th:href="@{/css/style.css}" rel="stylesheet">
</head>
<body>
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" th:href="@{/events}">Campus Event Tracker</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav me-auto">
                <li class="nav-item"><a class="nav-link" th:href="@{/events}">Events</a></li>
                <li class="nav-item"><a class="nav-link" th:href="@{/my-events}">My Events</a></li>
                <li class="nav-item" sec:authorize="hasRole('ORGANIZER')">
                    <a class="nav-link" th:href="@{/events/new}">Create Event</a>
                </li>
            </ul>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-light btn-sm">Logout</button>
            </form>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <div class="card shadow-sm">
        <div class="card-body">
            <h2 th:text="${event.title}">Event Title</h2>
            <hr>
            <div class="row">
                <div class="col-md-8">
                    <p><strong>Date & Time:</strong>
                        <span th:text="${#temporals.format(event.date, 'EEEE, MMMM dd, yyyy \'at\' h:mm a')}"></span>
                    </p>
                    <p><strong>Location:</strong> <span th:text="${event.location}"></span></p>
                    <p><strong>Organized by:</strong> <span th:text="${event.organizer.name}"></span></p>
                    <hr>
                    <h5>Description</h5>
                    <p th:text="${event.description}">Event description goes here.</p>
                </div>
                <div class="col-md-4">
                    <div class="card bg-light">
                        <div class="card-body text-center">
                            <h5 th:text="${event.attendees.size()} + ' Attending'">0 Attending</h5>

                            <!-- RSVP / Cancel -->
                            <form th:unless="${hasRsvped}" th:action="@{/events/{id}/rsvp(id=${event.id})}" method="post">
                                <button type="submit" class="btn btn-rsvp w-100">RSVP Now</button>
                            </form>
                            <form th:if="${hasRsvped}" th:action="@{/events/{id}/cancel-rsvp(id=${event.id})}" method="post">
                                <button type="submit" class="btn btn-outline-danger w-100">Cancel RSVP</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <a th:href="@{/events}" class="btn btn-secondary mt-3">Back to Events</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
