<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Delete Event — Campus Event Tracker</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a th:href="@{/events}" class="nav-brand">🎓 Campus Event Tracker</a>
            <div class="nav-links">
                <a th:href="@{/events}" class="nav-link">Events</a>
                <a th:href="@{/events/create}" class="nav-link btn-create">+ Create Event</a>
                <span class="nav-username" sec:authentication="name"
                    xmlns:sec="http://www.thymeleaf.org/extras/spring-security"></span>
                <form th:action="@{/auth/logout}" method="post" class="inline-form">
                    <button type="submit" class="btn-logout">Logout</button>
                </form>
            </div>
        </div>
    </nav>

    <div class="container">
        <a th:href="@{/events/{id}(id=${event.id})}" class="back-link">← Back to Event</a>

        <div class="event-detail">
            <h1>Delete Event</h1>
            <p>Are you sure you want to permanently delete <strong th:text="${event.title}">Event Title</strong>?</p>
            <p>This will also remove all RSVPs associated with this event. This action cannot be undone.</p>

            <div class="event-actions">
                <form th:action="@{/events/{id}/delete(id=${event.id})}" method="post">
                    <button type="submit" class="btn btn-danger btn-lg">Yes, Delete Event</button>
                </form>
                <a th:href="@{/events/{id}(id=${event.id})}" class="btn btn-outline">Cancel</a>
            </div>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Campus Event Tracker — University of Cincinnati</p>
    </footer>

    <script th:src="@{/js/app.js}"></script>
</body>

</html>
