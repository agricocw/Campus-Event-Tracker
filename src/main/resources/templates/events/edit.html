<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Edit Event — Campus Event Tracker</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a th:href="@{/events}" class="nav-brand">🎓 Campus Event Tracker</a>
            <div class="nav-links">
                <a th:href="@{/events}" class="nav-link">Events</a>
                <span sec:authorize="isAuthenticated()" class="nav-user">
                    <span class="nav-username" sec:authentication="name"></span>
                    <form th:action="@{/auth/logout}" method="post" class="inline-form">
                        <button type="submit" class="btn-logout">Logout</button>
                    </form>
                </span>
            </div>
        </div>
    </nav>

    <div class="container">
        <a th:href="@{/events/{id}(id=${eventId})}" class="back-link">← Back to Event</a>

        <div class="form-container">
            <h1 class="form-title">✏️ Edit Event</h1>

            <form th:action="@{/events/{id}/edit(id=${eventId})}" method="post" th:object="${form}">

                <div class="form-group">
                    <label for="title">Title</label>
                    <input type="text" id="title" th:field="*{title}" class="form-control" placeholder="Event title"
                        maxlength="255" />
                    <span class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <textarea id="description" th:field="*{description}" class="form-control" rows="5"
                        placeholder="Describe your event..." maxlength="2000"></textarea>
                    <span class="field-error" th:if="${#fields.hasErrors('description')}"
                        th:errors="*{description}"></span>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" th:field="*{category}" class="form-control">
                            <option value="">Select category</option>
                            <option value="Academic">Academic</option>
                            <option value="Social">Social</option>
                            <option value="Sports">Sports</option>
                            <option value="Arts">Arts</option>
                            <option value="Career">Career</option>
                            <option value="Workshop">Workshop</option>
                            <option value="Other">Other</option>
                        </select>
                        <span class="field-error" th:if="${#fields.hasErrors('category')}"
                            th:errors="*{category}"></span>
                    </div>
                    <div class="form-group">
                        <label for="location">Location</label>
                        <input type="text" id="location" th:field="*{location}" class="form-control"
                            placeholder="Building / Room" maxlength="255" />
                        <span class="field-error" th:if="${#fields.hasErrors('location')}"
                            th:errors="*{location}"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="startTime">Starts</label>
                        <input type="datetime-local" id="startTime" th:field="*{startTime}" class="form-control" />
                        <span class="field-error" th:if="${#fields.hasErrors('startTime')}"
                            th:errors="*{startTime}"></span>
                    </div>
                    <div class="form-group">
                        <label for="endTime">Ends</label>
                        <input type="datetime-local" id="endTime" th:field="*{endTime}" class="form-control" />
                        <span class="field-error" th:if="${#fields.hasErrors('endTime')}" th:errors="*{endTime}"></span>
                    </div>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="capacity">Capacity <small>(leave blank for unlimited)</small></label>
                        <input type="number" id="capacity" th:field="*{capacity}" class="form-control" min="1"
                            placeholder="50" />
                        <span class="field-error" th:if="${#fields.hasErrors('capacity')}"
                            th:errors="*{capacity}"></span>
                    </div>
                    <div class="form-group">
                        <label for="tags">Tags <small>(comma-separated)</small></label>
                        <input type="text" id="tags" th:field="*{tags}" class="form-control"
                            placeholder="java, workshop, free" maxlength="200" />
                        <span class="field-error" th:if="${#fields.hasErrors('tags')}" th:errors="*{tags}"></span>
                    </div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary btn-lg">Save Changes</button>
                    <a th:href="@{/events/{id}(id=${eventId})}" class="btn btn-outline">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Campus Event Tracker — University of Cincinnati</p>
    </footer>

    <script th:src="@{/js/app.js}"></script>
</body>

</html>
