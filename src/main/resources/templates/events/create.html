<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Event — Campus Event Tracker</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>

<body>
    <nav class="navbar">
        <div class="nav-container">
            <a th:href="@{/events}" class="nav-brand">🎓 Campus Event Tracker</a>
            <div class="nav-links">
                <a th:href="@{/events}" class="nav-link">Events</a>
                <a th:href="@{/events/create}" class="nav-link btn-create active">+ Create Event</a>
                <span sec:authorize="isAuthenticated()" class="nav-user">
                    <a th:href="@{/user/my-events}" class="nav-link">My Events</a>
                    <span class="nav-username" sec:authentication="name"></span>
                    <form th:action="@{/auth/logout}" method="post" class="inline-form">
                        <button type="submit" class="btn-logout">Logout</button>
                    </form>
                </span>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1 class="page-title">Create New Event</h1>

        <form th:action="@{/events/create}" th:object="${form}" method="post" class="event-form">
            <div class="form-group">
                <label for="title">Event Title *</label>
                <input type="text" id="title" th:field="*{title}" placeholder="Give your event a catchy title"
                    required />
                <span class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></span>
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" th:field="*{description}" rows="5"
                    placeholder="Tell attendees what to expect..."></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="category">Category *</label>
                    <select id="category" th:field="*{category}" required>
                        <option value="">Select a category</option>
                        <option value="Academic">Academic</option>
                        <option value="Social">Social</option>
                        <option value="Sports">Sports</option>
                        <option value="Arts">Arts & Culture</option>
                        <option value="Career">Career & Networking</option>
                        <option value="Workshop">Workshop</option>
                        <option value="Other">Other</option>
                    </select>
                    <span class="field-error" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></span>
                </div>

                <div class="form-group">
                    <label for="location">Location *</label>
                    <input type="text" id="location" th:field="*{location}" placeholder="Building, room, or address"
                        required />
                    <span class="field-error" th:if="${#fields.hasErrors('location')}" th:errors="*{location}"></span>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="startTime">Start Date & Time *</label>
                    <input type="datetime-local" id="startTime" th:field="*{startTime}" required />
                    <span class="field-error" th:if="${#fields.hasErrors('startTime')}" th:errors="*{startTime}"></span>
                </div>

                <div class="form-group">
                    <label for="endTime">End Date & Time *</label>
                    <input type="datetime-local" id="endTime" th:field="*{endTime}" required />
                    <span class="field-error" th:if="${#fields.hasErrors('endTime')}" th:errors="*{endTime}"></span>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="capacity">Capacity (leave empty for unlimited)</label>
                    <input type="number" id="capacity" th:field="*{capacity}" min="1" placeholder="e.g. 100" />
                    <span class="field-error" th:if="${#fields.hasErrors('capacity')}" th:errors="*{capacity}"></span>
                </div>

                <div class="form-group">
                    <label for="tags">Tags (comma-separated)</label>
                    <input type="text" id="tags" th:field="*{tags}" placeholder="e.g. free, outdoor, food" />
                </div>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Create Event (Draft)</button>
                <a th:href="@{/events}" class="btn btn-outline">Cancel</a>
            </div>
        </form>
    </div>

    <footer class="footer">
        <p>&copy; 2026 Campus Event Tracker — University of Cincinnati</p>
    </footer>

    <script th:src="@{/js/app.js}"></script>
</body>

</html>
