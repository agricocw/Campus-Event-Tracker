<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login — Campus Event Tracker</title>
    <link rel="stylesheet" th:href="@{/css/app.css}" />
</head>

<body>
    <div class="auth-container">
        <div class="auth-card">
            <h1>🎓 Campus Event Tracker</h1>
            <h2>Sign In</h2>

            <!-- Flash messages -->
            <div th:if="${param.error}" class="alert alert-error">
                Invalid email or password. Please try again.
            </div>
            <div th:if="${param.logout}" class="alert alert-success">
                You have been logged out successfully.
            </div>
            <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

            <form th:action="@{/auth/login}" method="post" class="auth-form">
                <div class="form-group">
                    <label for="username">Email</label>
                    <input type="email" id="username" name="username" placeholder="you@university.edu" required
                        autofocus />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required />
                </div>

                <button type="submit" class="btn btn-primary btn-block">Sign In</button>
            </form>

            <p class="auth-footer">
                Don't have an account?
                <a th:href="@{/auth/register}">Create one here</a>
            </p>
        </div>
    </div>
</body>

</html>
