# ── Dev Profile (H2 in-memory — no Docker needed) ─────────────
spring.datasource.url=jdbc:h2:mem:campus_event_dev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Let JPA/Hibernate auto-create schema (instead of Flyway for H2)
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true

# Disable Flyway for H2 (Flyway scripts use PostgreSQL-specific syntax)
spring.flyway.enabled=false

# Hot-reload templates in dev
spring.thymeleaf.cache=false

# H2 Console for debugging (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

logging.level.edu.uc.campusevent=DEBUG
